# Cloudflare Pages Wrangler 配置
name = "lunatv"
compatibility_date = "2024-01-01"

# 环境变量配置
[vars]
NEXT_PUBLIC_SITE_NAME = "LunaTV"
NEXT_PUBLIC_STORAGE_TYPE = "cloudflare-kv"

# KV 命名空间绑定
[[kv_namespaces]]
binding = "LUNATV_KV"
id = "your-kv-namespace-id"
preview_id = "your-kv-namespace-id"

# 路由配置
[[routes]]
pattern = "/*"
custom_domain = ""
